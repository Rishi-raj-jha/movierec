<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRec</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">🎬 MovieRec</span>
        <input id="searchInput" class="form-control ms-3" style="width:200px;" type="text" placeholder="Search..." onkeyup="searchMovies()">
    </div>
</nav>

<!-- Hero Banner -->
<div class="container mt-3">
    <div class="hero-banner" style="background-image: url('images/interstellar.jpg');">
        <div class="hero-content">
            <h2>Interstellar</h2>
            <p>Explore space and time</p>
            <a href="https://www.hotstar.com" target="_blank" class="btn btn-danger">▶ Play Now</a>
        </div>
    </div>
</div>

<div class="container mt-4 text-center">
    <button class="btn btn-light m-1" onclick="filterCategory('all')">All</button>
    <button class="btn btn-warning m-1" onclick="filterCategory('comedy')">Comedy</button>
    <button class="btn btn-danger m-1" onclick="filterCategory('action')">Action</button>
    <button class="btn btn-info m-1" onclick="filterCategory('sci-fi')">Sci-Fi</button>
</div>

<!-- Trending -->
<div class="container mt-4 section-box">
    <h3 class="text-white">🔥 Trending Now</h3>

    <div class="d-flex gap-3 overflow-auto mt-3">
        <img src="images/inception.jpg" class="movie-img shadow">
        <img src="images/interstellar.jpg" class="movie-img shadow">
        <img src="images/kgf.webp" class="movie-img shadow">
        <img src="images/hangover.jpg" class="movie-img shadow">
    </div>
</div>

<!-- Movies Grid -->
<div class="container mt-5 section-box">
    <div class="row g-4">

        <div class="col-md-4 movie-card" data-title="inception" data-category="sci-fi">
            <div class="card">
                <img src="images/inception.jpg" class="card-img-top">
                <div class="card-body">
                    <h5>Inception</h5>
                    <p>A mind-bending thriller.</p>
                    <a href="https://www.netflix.com" target="_blank" class="btn btn-danger btn-sm">Watch</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 movie-card" data-title="3 idiots" data-category="comedy">
            <div class="card">
                <img src="images/3idiots.jpg" class="card-img-top">
                <div class="card-body">
                    <h5>3 Idiots</h5>
                    <p>Inspirational college life movie.</p>
                    <a href="https://www.primevideo.com" target="_blank" class="btn btn-warning btn-sm">Watch</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 movie-card" data-title="rrr" data-category="action">
            <div class="card">
                <img src="images/rrr.jpg" class="card-img-top">
                <div class="card-body">
                    <h5>RRR</h5>
                    <p>Epic action drama.</p>
                    <a href="https://www.hotstar.com" target="_blank" class="btn btn-info btn-sm">Watch</a>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
function searchMovies() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.getElementsByClassName("movie-card");

    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].getAttribute("data-title");
        cards[i].style.display = title.includes(input) ? "block" : "none";
    }
}

function filterCategory(category) {
    let cards = document.getElementsByClassName("movie-card");

    for (let i = 0; i < cards.length; i++) {
        let cat = cards[i].getAttribute("data-category");

        if (category === "all" || cat === category) {
            cards[i].style.display = "block";
        } else {
            cards[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
